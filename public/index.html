<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rihla — Flight Search</title>
  <style>
    :root {
      --bg: #0f1729;
      --panel: #1a2338;
      --panel-2: #212c46;
      --border: #2c3a5a;
      --text: #e7ecf5;
      --muted: #93a1c0;
      --accent: #4f8cff;
      --accent-ink: #fff;
      --good: #37d39b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1120 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px 64px;
    }
    .wrap { max-width: 960px; margin: 0 auto; }
    header { margin-bottom: 24px; }
    h1 { margin: 0 0 4px; font-size: 26px; letter-spacing: -0.02em; }
    .sub { color: var(--muted); font-size: 14px; }
    form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      align-items: end;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 20px;
    }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    input {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 9px;
      padding: 10px 12px;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: #5f6f92; }
    button {
      background: var(--accent);
      color: var(--accent-ink);
      border: none;
      border-radius: 9px;
      padding: 11px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: filter .15s;
    }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: .6; cursor: default; }
    .field-btn { grid-column: 1 / -1; display: flex; gap: 12px; align-items: center; }
    .status { color: var(--muted); font-size: 14px; min-height: 20px; margin: 8px 2px 16px; }
    .status.error { color: #ff7a7a; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    thead th {
      text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: .04em;
      color: var(--muted); padding: 12px 14px; background: var(--panel-2); border-bottom: 1px solid var(--border);
    }
    tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 15px; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--panel-2); }
    .price { font-weight: 700; color: var(--good); white-space: nowrap; }
    .airline { font-weight: 600; }
    .pill { display: inline-block; font-size: 12px; padding: 2px 9px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); }
    .cheapest td { box-shadow: inset 3px 0 0 var(--good); }
    .muted { color: var(--muted); font-size: 13px; }
    footer { margin-top: 22px; color: var(--muted); font-size: 12px; text-align: center; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>✈️ Rihla — Flight Search</h1>
      <div class="sub">Live results via headless browser. First search takes ~20s while the page loads.</div>
    </header>

    <form id="searchForm">
      <div>
        <label for="from">From</label>
        <input id="from" name="from" placeholder="RUH" value="RUH" autocomplete="off" required />
      </div>
      <div>
        <label for="to">To</label>
        <input id="to" name="to" placeholder="DXB" value="DXB" autocomplete="off" required />
      </div>
      <div>
        <label for="departDate">Depart</label>
        <input id="departDate" name="departDate" type="date" required />
      </div>
      <div>
        <label for="returnDate">Return <span style="text-transform:none">(optional)</span></label>
        <input id="returnDate" name="returnDate" type="date" />
      </div>
      <div class="field-btn">
        <button id="searchBtn" type="submit">Search flights</button>
        <span class="muted">Use IATA codes (RUH, DXB, JED, LHR…). Leave Return empty for one-way.</span>
      </div>
    </form>

    <div id="status" class="status"></div>

    <table id="results" class="hidden">
      <thead>
        <tr>
          <th>Airline</th>
          <th>Price</th>
          <th>Duration</th>
          <th>Stops</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>

    <footer>Rihla flight scraper · results sourced live · no booking, no storage</footer>
  </div>

  <script>
    const form = document.getElementById("searchForm");
    const statusEl = document.getElementById("status");
    const table = document.getElementById("results");
    const tbody = document.getElementById("resultsBody");
    const btn = document.getElementById("searchBtn");

    // Default depart date = 30 days out, so the form works on first load.
    const d = new Date();
    d.setDate(d.getDate() + 30);
    document.getElementById("departDate").value = d.toISOString().slice(0, 10);

    // When served over http(s) we call the API same-origin (relative path).
    // When the file is opened directly (file:// — no base URL), relative
    // fetch fails to parse, so fall back to the deployed API.
    const API_BASE = /^https?:$/.test(location.protocol)
      ? ""
      : "https://rihla-flight-scraper-production.up.railway.app";

    const stopsLabel = (s) => s === 0 ? "Nonstop" : s == null ? "—" : s === 1 ? "1 stop" : `${s} stops`;
    const esc = (str) => String(str).replace(/[&<>"']/g, (c) => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
    ));

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const params = new URLSearchParams();
      ["from", "to", "departDate", "returnDate"].forEach((k) => {
        const v = form.elements[k].value.trim();
        if (v) params.set(k, k === "from" || k === "to" ? v.toUpperCase() : v);
      });

      table.classList.add("hidden");
      tbody.innerHTML = "";
      statusEl.className = "status";
      statusEl.textContent = "Searching live flights… this can take ~20 seconds.";
      btn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/api/flights?${params.toString()}`);
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || data.error || `Request failed (${res.status})`);

        const flights = data.flights || [];
        if (flights.length === 0) {
          statusEl.className = "status error";
          statusEl.textContent = data.warning || "No flights found for that route/date.";
          return;
        }

        // Sort cheapest first and mark the best price.
        flights.sort((a, b) => (a.price ?? Infinity) - (b.price ?? Infinity));
        const best = flights[0].price;

        tbody.innerHTML = flights.map((f) => `
          <tr class="${f.price === best ? "cheapest" : ""}">
            <td class="airline">${esc(f.airline)}</td>
            <td class="price">${f.price != null ? f.price.toLocaleString() : "—"} ${esc(f.currency || "")}</td>
            <td>${esc(f.duration || "—")}</td>
            <td><span class="pill">${stopsLabel(f.stops)}</span></td>
            <td class="muted">${esc(f.raw || "")}</td>
          </tr>
        `).join("");

        statusEl.textContent = `${flights.length} flight${flights.length === 1 ? "" : "s"} · cheapest ${best.toLocaleString()} ${esc(flights[0].currency || "")}`;
        table.classList.remove("hidden");
      } catch (err) {
        statusEl.className = "status error";
        statusEl.textContent = `Error: ${err.message}`;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
